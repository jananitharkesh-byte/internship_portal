<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BIAL Internships · Enhanced</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          colors: {
            bial: {
              teal: '#0D9488',
              'teal-dark': '#0F766E',
              'teal-light': '#14B8A6',
              red: '#DC2626',
              'red-dark': '#B91C1C',
              amber: '#D97706',
              'amber-dark': '#B45309',
              'amber-light': '#F59E0B',
              slate: '#1E293B',
            }
          },
          animation: {
            float: 'float 6s ease-in-out infinite',
            'float-slow': 'float 9s ease-in-out infinite',
            'slide-up': 'slideUp 0.5s ease-out backwards',
            'fade-in': 'fadeIn 0.3s ease-out',
            'scale-in': 'scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) backwards',
            'gradient-shift': 'gradientShift 8s ease infinite',
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' }, '50%': { transform: 'translateY(-14px) rotate(3deg)' } },
            slideUp: { '0%': { transform: 'translateY(24px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            scaleIn: { '0%': { transform: 'scale(0.92)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
            gradientShift: { '0%, 100%': { backgroundPosition: '0% 50%' }, '50%': { backgroundPosition: '100% 50%' } }
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    * {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    }
    body {
      transition: background-color 0.3s ease, color 0.3s ease;
      letter-spacing: -0.01em;
    }
    .dark {
      background-color: #0f172a;
      color: #e2e8f0;
    }
    .dark body {
      background-color: #0f172a;
      color: #e2e8f0;
    }
    .stat-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
    }
    .dark .stat-card:hover {
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
    }
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: linear-gradient(135deg, #0d9488, #dc2626);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }
    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .dark select {
      background-color: #1e293b;
      color: #e2e8f0;
    }
    .dark select option {
      background-color: #1e293b;
      color: #e2e8f0;
    }
    .dark input,
    .dark textarea {
      background-color: #1e293b;
      color: #e2e8f0;
      border-color: #334155;
    }
    .dark input::placeholder,
    .dark textarea::placeholder {
      color: #64748b;
    }
    .gradient-text {
      background: linear-gradient(135deg, #0d9488, #dc2626, #d97706);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientShift 4s ease infinite;
    }
    .glow-btn {
      position: relative;
      overflow: hidden;
    }
    .glow-btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(135deg, #0d9488, #d97706);
      opacity: 0;
      transition: opacity 0.35s ease;
      z-index: -1;
      filter: blur(14px);
    }
    .glow-btn:hover::before {
      opacity: 0.55;
    }
    .glow-btn:active {
      transform: scale(0.97);
    }
    .card-hover {
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 48px -16px rgba(13, 148, 136, 0.25);
      border-color: rgba(13, 148, 136, 0.4);
    }
    .dark .card-hover:hover {
      box-shadow: 0 24px 48px -16px rgba(13, 148, 136, 0.35);
    }
    .pulse-dot {
      position: relative;
    }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: inherit;
      animation: ping 1.8s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      75%,
      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }
    .avatar-ring {
      background: conic-gradient(from 180deg, #0d9488, #d97706, #dc2626, #0d9488);
      padding: 3px;
      border-radius: 1rem;
    }
    .modal-backdrop {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .clickable-name {
      cursor: pointer;
      text-decoration-color: transparent;
      text-underline-offset: 3px;
      transition: all 0.2s ease;
    }
    .clickable-name:hover {
      text-decoration-line: underline;
      text-decoration-color: currentColor;
      color: #0d9488;
    }
    .dark .clickable-name:hover {
      color: #14b8a6;
    }
    .segmented {
      position: relative;
      display: inline-flex;
      padding: 4px;
      border-radius: 0.9rem;
    }
    .segmented .thumb {
      position: absolute;
      top: 4px;
      bottom: 4px;
      border-radius: 0.7rem;
      transition: left 0.3s cubic-bezier(0.65, 0, 0.35, 1), width 0.3s cubic-bezier(0.65, 0, 0.35, 1);
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
    .dark .segmented .thumb {
      background: linear-gradient(135deg, #ffffff, #e2e8f0);
    }
    ::selection {
      background: rgba(13, 148, 136, 0.25);
    }
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .file-input-wrapper input[type=file] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="app"></div>
  <script>
    // ============================================================
    //  ENHANCED BIAL INTERNSHIP PORTAL
    //  - Admin dashboard stats are clickable (linked to pages)
    //  - Applicant name click → detailed profile modal (with resume download)
    //  - Application modal includes file upload (resume) stored as base64
    //  - Settings: Shows CV files from applications + Export to Excel
    //  - AUTO-CONVERT: When admin sets status to "selected", student becomes intern
    // ============================================================

    const ADMIN_EMAIL = 'admin@bial.aero';
    const ADMIN_PASSWORD = 'admin123';

    const DEPARTMENTS = [
      'Airport Operations', 'Engineering & Maintenance', 'IT & Digital',
      'Finance', 'Human Resources', 'Commercial & Retail', 'Safety & Security', 'Sustainability'
    ];

    const STORAGE_KEYS = {
      users: 'bial_v11_users',
      internships: 'bial_v11_internships',
      applications: 'bial_v11_applications',
      activeInterns: 'bial_v11_active_interns',
      session: 'bial_v11_session',
      theme: 'bial_v11_theme',
      googleFormUrl: 'bial_v11_google_form_url',
      formSubmissions: 'bial_v11_form_submissions'
    };

    const db = {
      get(k) { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
      set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
      getUsers() { return db.get(STORAGE_KEYS.users); },
      saveUsers(u) { db.set(STORAGE_KEYS.users, u); },
      getInternships() { return db.get(STORAGE_KEYS.internships); },
      saveInternships(l) { db.set(STORAGE_KEYS.internships, l); },
      getApplications() { return db.get(STORAGE_KEYS.applications); },
      saveApplications(l) { db.set(STORAGE_KEYS.applications, l); },
      getActiveInterns() { return db.get(STORAGE_KEYS.activeInterns); },
      saveActiveInterns(l) { db.set(STORAGE_KEYS.activeInterns, l); },
      getSession() { try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.session)); } catch { return null; } },
      setSession(s) { localStorage.setItem(STORAGE_KEYS.session, JSON.stringify(s)); },
      clearSession() { localStorage.removeItem(STORAGE_KEYS.session); },
      getTheme() { return localStorage.getItem(STORAGE_KEYS.theme) || 'light'; },
      setTheme(t) { localStorage.setItem(STORAGE_KEYS.theme, t); },
      getGoogleFormUrl() { return localStorage.getItem(STORAGE_KEYS.googleFormUrl) || ''; },
      setGoogleFormUrl(url) { localStorage.setItem(STORAGE_KEYS.googleFormUrl, url); },
      getFormSubmissions() { return db.get(STORAGE_KEYS.formSubmissions); },
      saveFormSubmissions(s) { db.set(STORAGE_KEYS.formSubmissions, s); }
    };

    function simpleHash(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i);
        h |= 0; } return 'h_' + h.toString(36); }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 10); }

    function fmtDate(d) { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); }

    function daysFromNow(n) { const d = new Date();
      d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }

    const STYLES = {
      status: {
        pending: 'bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800',
        shortlisted: 'bg-teal-100 text-teal-800 border-teal-200 dark:bg-teal-900/30 dark:text-teal-300 dark:border-teal-800',
        selected: 'bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800',
        rejected: 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800'
      },
      dept: {
        'Airport Operations': 'bg-teal-100 text-teal-800 border-teal-200 dark:bg-teal-900/30 dark:text-teal-300 dark:border-teal-800',
        'Engineering & Maintenance': 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800',
        'IT & Digital': 'bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800',
        'Finance': 'bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800',
        'Human Resources': 'bg-rose-100 text-rose-800 border-rose-200 dark:bg-rose-900/30 dark:text-rose-300 dark:border-rose-800',
        'Commercial & Retail': 'bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800',
        'Safety & Security': 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800',
        'Sustainability': 'bg-teal-100 text-teal-800 border-teal-200 dark:bg-teal-900/30 dark:text-teal-300 dark:border-teal-800'
      }
    };

    function initTheme() { document.documentElement.className = db.getTheme(); }
    initTheme();

    function toggleTheme() {
      const next = document.documentElement.className === 'dark' ? 'light' : 'dark';
      document.documentElement.className = next;
      db.setTheme(next);
      render();
    }

    function showToast(msg, type = 'success') {
      let c = document.getElementById('toast-container');
      if (!c) { c = document.createElement('div');
        c.id = 'toast-container';
        c.className = 'fixed bottom-4 right-4 z-50 flex flex-col gap-2';
        document.body.appendChild(c); }
      const t = document.createElement('div');
      const bgColor = type === 'error' ? 'bg-red-600' : type === 'warning' ? 'bg-amber-600' : 'bg-teal-600';
      t.className = `rounded-xl px-5 py-3 text-sm font-semibold shadow-2xl animate-slide-up ${bgColor} text-white`;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0';
        t.style.transform = 'translateX(100px)';
        t.style.transition = 'all 0.3s ease';
        setTimeout(() => t.remove(), 300); }, 3000);
    }

    function seed() {
      let users = db.getUsers();
      if (!users.find(u => u.email === ADMIN_EMAIL)) {
        users.push({ id: uid(), name: 'BIAL Admin', email: ADMIN_EMAIL, password: simpleHash(ADMIN_PASSWORD), role: 'admin',
          department: 'IT & Digital', college: '', year: '', skills: [], projects: [], bio: '',
          createdAt: new Date().toISOString() });
        db.saveUsers(users);
      }
      if (db.getInternships().length === 0) {
        const admin = users.find(u => u.email === ADMIN_EMAIL);
        db.saveInternships([
          { id: uid(), title: 'Airport Operations Management Intern', department: 'Airport Operations',
            description: 'Gain comprehensive exposure to terminal operations, passenger flow management, and ground handling coordination.',
            location: 'Kempegowda International Airport, Bengaluru', duration: '6 months', stipend: 'Rs 25,000/month',
            skills: ['Operations', 'Analysis', 'Leadership'], lastDate: daysFromNow(25), postedBy: admin.id,
            createdAt: new Date().toISOString(), googleFormRequired: true },
          { id: uid(), title: 'Full Stack Developer Intern', department: 'IT & Digital',
            description: 'Build next-generation airport digital solutions. Work on passenger processing systems and IoT integration.',
            location: 'BIAL HQ, Bengaluru', duration: '6 months', stipend: 'Rs 30,000/month',
            skills: ['React', 'Node.js', 'AWS'], lastDate: daysFromNow(20), postedBy: admin.id,
            createdAt: new Date().toISOString(), googleFormRequired: true },
          { id: uid(), title: 'Sustainability Analyst Intern', department: 'Sustainability',
            description: 'Contribute to BIAL net-zero goals. Work on environmental assessments and renewable energy projects.',
            location: 'BIAL Campus, Bengaluru', duration: '4 months', stipend: 'Rs 22,000/month',
            skills: ['ESG', 'Data Analysis', 'Python'], lastDate: daysFromNow(30), postedBy: admin.id,
            createdAt: new Date().toISOString(), googleFormRequired: true }
        ]);
      }
      if (db.getActiveInterns().length === 0) {
        db.saveActiveInterns([
          { id: uid(), name: 'Rohit Krishnan', email: 'rohit.k@bial.intern', department: 'IT & Digital',
            college: 'RVCE Bengaluru', year: 'Final Year', skills: ['React', 'Node.js'], projects: ['Dashboard', 'API'],
            bio: 'Full-stack developer passionate about aviation tech.', startDate: '2026-01-15', endDate: '2026-07-15',
            mentor: 'Suresh Kumar', status: 'active' },
          { id: uid(), name: 'Ananya Gupta', email: 'ananya.g@bial.intern', department: 'Sustainability',
            college: 'IISc Bengaluru', year: 'M.Tech', skills: ['Python', 'GIS'], projects: ['Carbon Analysis'],
            bio: 'Environmental engineer focused on sustainable aviation.', startDate: '2026-02-01', endDate: '2026-08-01',
            mentor: 'Dr. Meera Iyer', status: 'active' }
        ]);
      }
      // Seed some form submissions for demo
      if (db.getFormSubmissions().length === 0) {
        db.saveFormSubmissions([
          { id: uid(), applicationId: uid(), studentId: uid(), studentName: 'Rahul Sharma', studentEmail: 'rahul.s@example.com',
            studentCollege: 'IIT Bombay', studentYear: 'Final Year', internshipId: db.getInternships()[0]?.id || '',
            submittedAt: new Date().toISOString(), status: 'submitted' },
          { id: uid(), applicationId: uid(), studentId: uid(), studentName: 'Priya Patel', studentEmail: 'priya.p@example.com',
            studentCollege: 'BITS Pilani', studentYear: '3rd Year', internshipId: db.getInternships()[1]?.id || '',
            submittedAt: new Date().toISOString(), status: 'submitted' }
        ]);
      }
    }
    seed();

    function escapeHtml(s = '') { const d = document.createElement('div');
      d.textContent = s; return d.innerHTML; }

    function logout() { db.clearSession();
      location.hash = '#/login'; }

    function requireRole(role) {
      const session = db.getSession();
      if (!session) { location.hash = '#/login'; return null; }
      const user = db.getUsers().find(u => u.id === session.userId);
      if (!user) { db.clearSession();
        location.hash = '#/login'; return null; }
      if (role && user.role !== role) { location.hash = user.role === 'admin' ? '#/admin' : '#/home'; return null; }
      return user;
    }

    function badgeStyle(type, key) {
      return STYLES[type]?.[key] || 'bg-gray-100 text-gray-800 border-gray-200 dark:bg-gray-900/30 dark:text-gray-300 dark:border-gray-800';
    }

    function navbar() {
      const session = db.getSession();
      if (!session) return '';
      const user = db.getUsers().find(u => u.id === session.userId);
      if (!user) return '';
      const currentHash = location.hash || '#/home';
      const isDark = document.documentElement.className === 'dark';
      const studentLinks = [
        { href: '#/home', label: 'Home' },
        { href: '#/positions', label: 'Open Positions' },
        { href: '#/applications', label: 'My Applications' },
        { href: '#/interns', label: 'Interns' },
        { href: '#/about', label: 'About BIAL' },
        { href: '#/profile', label: 'Profile' }
      ];
      const adminLinks = [
        { href: '#/admin', label: 'Dashboard' },
        { href: '#/admin/internships', label: 'Positions' },
        { href: '#/admin/applications', label: 'Applications' },
        { href: '#/admin/active-interns', label: 'Interns' },
        { href: '#/admin/settings', label: 'Settings' },
        { href: '#/about', label: 'About BIAL' }
      ];
      const links = user.role === 'student' ? studentLinks : adminLinks;
      return `
        <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-950/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
          <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3">
            <a href="${user.role === 'admin' ? '#/admin' : '#/home'}" class="flex items-center gap-3 group">
              <svg class="w-8 h-8 text-bial-teal" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
              <div>
                <div class="text-lg font-bold text-slate-900 dark:text-white tracking-tight">BIAL</div>
                <div class="text-[10px] text-slate-500 dark:text-slate-400 font-medium tracking-wider uppercase">Internship Program</div>
              </div>
            </a>
            <div class="hidden lg:flex items-center gap-1">
              ${links.map(link => {
                const isActive = currentHash === link.href;
                return `
                  <a href="${link.href}" class="nav-link px-3 py-2 rounded-lg text-sm font-medium transition-colors ${isActive ? 'text-bial-teal bg-teal-50 dark:bg-teal-900/20 active' : 'text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800'}">
                    ${link.label}
                  </a>`;
              }).join('')}
              <div class="ml-3 flex items-center gap-2 pl-3 border-l border-slate-200 dark:border-slate-700">
                <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-slate-400">
                  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    ${isDark ? 
                      '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>' :
                      '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>'
                    }
                  </svg>
                </button>
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-bial-teal to-bial-amber flex items-center justify-center text-white text-xs font-bold">${user.name.split(' ').map(n => n[0]).join('').toUpperCase()}</div>
                  <button onclick="logout()" class="px-3 py-1.5 rounded-lg text-sm font-medium text-bial-red hover:bg-red-50 dark:hover:bg-red-900/20 transition">Sign Out</button>
                </div>
              </div>
            </div>
            <div class="flex lg:hidden items-center gap-2">
              <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">${isDark ? '&#9728;' : '&#9790;'}</button>
              <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
                <svg class="w-6 h-6 text-slate-700 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
              </button>
            </div>
          </div>
          <div id="mobileMenu" class="hidden lg:hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950">
            <div class="px-4 py-3 space-y-1">
              ${links.map(link => `<a href="${link.href}" class="block px-3 py-2.5 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">${link.label}</a>`).join('')}
              <hr class="my-2 border-slate-200 dark:border-slate-800">
              <div class="flex items-center justify-between px-3 py-2">
                <span class="text-sm font-medium text-slate-900 dark:text-white">${escapeHtml(user.name)}</span>
                <button onclick="logout()" class="px-3 py-1.5 rounded-lg text-sm font-medium text-bial-red hover:bg-red-50 dark:hover:bg-red-900/20">Sign Out</button>
              </div>
            </div>
          </div>
        </nav>`;
    }

    // ----- ABOUT PAGE (unchanged) -----
    function pageAbout() {
      const session = db.getSession();
      const user = session ? db.getUsers().find(u => u.id === session.userId) : null;
      return `
        ${user ? navbar() : `
          <nav class="sticky top-0 z-50 bg-white/90 dark:bg-slate-950/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
            <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3">

    // ============================================================
    //  ENHANCED APPLICATION MODAL (with file upload)
    // ============================================================
    function openApplicationModal(internshipId) {
      const user = requireRole('student');
      if (!user) return;
      const internship = db.getInternships().find(i => i.id === internshipId);
      if (!internship) return;
      const googleFormUrl = db.getGoogleFormUrl();
      const hasGoogleForm = internship.googleFormRequired && googleFormUrl;

      const overlay = document.createElement('div');
      overlay.id = 'applicationModalOverlay';
      overlay.className = 'fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/70 modal-backdrop animate-fade-in';
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeApplicationModal(); });

      overlay.innerHTML = `
        <div class="w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-3xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-2xl animate-scale-in">
          <div class="relative bg-gradient-to-br from-bial-teal to-bial-teal-dark rounded-t-3xl px-8 pt-8 pb-12 text-white overflow-hidden">
            <button onclick="closeApplicationModal()" class="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition z-10">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <h2 class="text-2xl font-black">Apply for Position</h2>
            <p class="text-teal-100 text-sm mt-1">${escapeHtml(internship.title)}</p>
          </div>
          <div class="px-8 pb-8 -mt-8">
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg border border-slate-200 dark:border-slate-700">
              <div id="appFormError" class="mb-4 hidden rounded-xl bg-red-50 dark:bg-red-900/20 px-4 py-3 text-sm text-red-700 dark:text-red-400 border border-red-200 dark:border-red-800"></div>
              ${hasGoogleForm ? `
                <div class="mb-6 p-4 rounded-xl bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800">
                  <p class="text-sm font-semibold text-amber-800 dark:text-amber-300 mb-2">Step 1: Fill the Google Form</p>
                  <p class="text-xs text-amber-700 dark:text-amber-400 mb-3">You must complete the Google Form before submitting your application.</p>
                  <a href="${googleFormUrl}" target="_blank" class="inline-block rounded-lg bg-amber-600 text-white px-4 py-2 text-xs font-bold hover:bg-amber-700 transition">Open Google Form</a>
                </div>
                <div class="mb-6">
                  <label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Step 2: Confirm and Submit</label>
                  <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="formCompletedCheckbox" class="w-5 h-5 rounded border-slate-300 text-bial-teal focus:ring-bial-teal" />
                    <span class="text-sm text-slate-600 dark:text-slate-300">I have completed and submitted the Google Form</span>
                  </label>
                </div>
              ` : `
                <div class="mb-6 p-4 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
                  <p class="text-sm text-slate-600 dark:text-slate-300">Submit your application below. No additional form required.</p>
                </div>
              `}
              <div class="mb-6">
                <label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Why are you interested?</label>
                <textarea id="coverLetterTextarea" rows="3" class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-700 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" placeholder="Tell us why you're a great fit..."></textarea>
              </div>
              <!-- Resume / File Upload -->
              <div class="mb-6">
                <label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Upload Resume (PDF, DOC, DOCX, PNG, JPG)</label>
                <div class="file-input-wrapper w-full">
                  <button class="w-full rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-800/50 px-4 py-3 text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition text-center">
                    <span id="fileNameDisplay">Choose file...</span>
                  </button>
                  <input type="file" id="resumeFileInput" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" />
                </div>
                <p class="text-xs text-slate-400 dark:text-slate-500 mt-1">Max 2MB. File will be stored securely.</p>
              </div>
              <button id="submitApplicationButton" class="w-full rounded-xl bg-bial-teal text-white py-3.5 text-sm font-bold hover:bg-bial-teal-dark transition shadow-lg">
                Submit Application
              </button>
            </div>
          </div>
        </div>`;

      document.body.appendChild(overlay);

      // File input handler
      const fileInput = document.getElementById('resumeFileInput');
      const fileNameDisplay = document.getElementById('fileNameDisplay');
      let fileData = null;
      let fileBase64 = null;
      let fileType = null;

      if (fileInput) {
        fileInput.addEventListener('change', function(e) {
          const file = this.files[0];
          if (!file) { fileNameDisplay.textContent = 'Choose file...';
            fileData = null;
            fileBase64 = null; return; }
          if (file.size > 2 * 1024 * 1024) {
            showToast('File too large. Max 2MB.', 'error');
            this.value = '';
            fileNameDisplay.textContent = 'Choose file...';
            return;
          }
          fileNameDisplay.textContent = file.name;
          fileType = file.type;
          const reader = new FileReader();
          reader.onload = function(ev) {
            fileBase64 = ev.target.result;
            fileData = { name: file.name, type: file.type, base64: fileBase64 };
          };
          reader.readAsDataURL(file);
        });
      }

      // Submit
      setTimeout(() => {
        const btn = document.getElementById('submitApplicationButton');
        if (btn) {
          btn.onclick = function() {
            const formCompleted = document.getElementById('formCompletedCheckbox');
            const isFormCompleted = formCompleted ? formCompleted.checked : true;
            const coverLetter = document.getElementById('coverLetterTextarea')?.value || '';
            const errEl = document.getElementById('appFormError');

            if (hasGoogleForm && !isFormCompleted) {
              if (errEl) { errEl.textContent = 'Please complete the Google Form first and check the confirmation box';
                errEl.classList.remove('hidden'); }
              return;
            }

            const apps = db.getApplications();
            if (apps.find(a => a.studentId === user.id && a.internshipId === internshipId)) {
              showToast('Already applied to this position', 'error');
              return;
            }

            const application = {
              id: uid(),
              studentId: user.id,
              internshipId: internshipId,
              status: 'pending',
              appliedAt: new Date().toISOString(),
              coverLetter: coverLetter,
              googleFormCompleted: hasGoogleForm,
              resume: fileData || null // store {name, type, base64}
            };

            apps.push(application);
            db.saveApplications(apps);

            if (hasGoogleForm) {
              const submissions = db.getFormSubmissions();
              const subId = uid();
              submissions.push({
                id: subId,
                applicationId: application.id,
                studentId: user.id,
                studentName: user.name,
                studentEmail: user.email,
                studentCollege: user.college,
                studentYear: user.year,
                internshipId: internshipId,
                submittedAt: new Date().toISOString(),
                status: 'submitted'
              });
              db.saveFormSubmissions(submissions);
            }

            closeApplicationModal();
            showToast('Application submitted successfully!');
            render();
          };
        }
      }, 100);
    }

    function closeApplicationModal() {
      document.getElementById('applicationModalOverlay')?.remove();
    }

    // ============================================================
    //  UPDATED: updateAppStatus with AUTO-CONVERT to Intern
    // ============================================================
    function updateAppStatus(id, status) {
      const apps = db.getApplications();
      const a = apps.find(x => x.id === id);
      if (!a) return;
      
      const oldStatus = a.status;
      a.status = status;
      db.saveApplications(apps);
      
      // 🔥 AUTO-CONVERT: If status changed to "selected", add to interns
      if (status === 'selected' && oldStatus !== 'selected') {
        const users = db.getUsers();
        const student = users.find(u => u.id === a.studentId);
        const internship = db.getInternships().find(i => i.id === a.internshipId);
        
        if (student) {
          // Check if already an intern
          const existingInterns = db.getActiveInterns();
          const alreadyIntern = existingInterns.find(intern => intern.email === student.email);
          
          if (!alreadyIntern) {
            // Auto-generate start date (today) and end date (6 months from now)
            const startDate = new Date().toISOString().slice(0, 10);
            const endDate = new Date();
            endDate.setMonth(endDate.getMonth() + 6);
            const endDateStr = endDate.toISOString().slice(0, 10);
            
            const newIntern = {
              id: uid(),
              name: student.name,
              email: student.email,
              department: internship ? internship.department : 'IT & Digital',
              college: student.college || 'N/A',
              year: student.year || 'N/A',
              skills: student.skills || [],
              projects: student.projects || [],
              bio: student.bio || '',
              startDate: startDate,
              endDate: endDateStr,
              mentor: 'TBD',
              status: 'active',
              createdAt: new Date().toISOString()
            };
            
            existingInterns.push(newIntern);
            db.saveActiveInterns(existingInterns);
            showToast('✅ Student auto-converted to Intern!');
          } else {
            showToast('⚠️ Student is already an intern', 'warning');
          }
        }
      }
      
      // If status is changed FROM "selected" to something else, remove from interns? No, keep them.
      // We'll keep interns even if status changes back.
      
      showToast('Status updated');
      renderAdminApps();
      // Also re-render the whole app to update dashboard counts
      render();
    }

    // ============================================================
    //  EXPORT TO EXCEL (CSV format, opens in Excel)
    // ============================================================
    function exportSubmissionsToExcel() {
      const submissions = db.getFormSubmissions();
      if (submissions.length === 0) {
        showToast('No submissions to export', 'warning');
        return;
      }

      // Create CSV content
      let csv = '\uFEFF'; // BOM for Excel UTF-8
      csv += 'Student Name,Email,College,Year,Submission Date,CV Uploaded\n';
      
      const applications = db.getApplications();
      submissions.forEach(s => {
        const app = applications.find(a => a.id === s.applicationId);
        const hasResume = app && app.resume && app.resume.base64 ? 'Yes' : 'No';
        csv += `"${s.studentName}","${s.studentEmail}","${s.studentCollege}","${s.studentYear}","${new Date(s.submittedAt).toLocaleString()}","${hasResume}"\n`;
      });

      // Download as CSV
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `BIAL_Form_Submissions_${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
      showToast('Exported successfully!');
    }

          <div class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-8">

              <div class="grid grid-cols-2 gap-4"><div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Name *</label><input name="name" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div><div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Email *</label><input type="email" name="email" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div></div>
              <div class="grid grid-cols-2 gap-4"><div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Dept *</label><select name="department" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition"><option value="">Select</option>${DEPARTMENTS.map(d => `<option>${d}</option>`).join('')}</select></div><div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">College *</label><input name="college" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div></div>
              <div class="grid grid-cols-2 gap-4"><div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Start *</label><input type="date" name="startDate" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div><div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">End *</label><input type="date" name="endDate" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div></div>
              <div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Mentor *</label><input name="mentor" required class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div>
              <div><label class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">Skills</label><input name="skills" class="w-full rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-sm text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:border-bial-teal focus:ring-2 focus:ring-teal-100 dark:focus:ring-teal-900 transition" /></div>
              <button type="submit" class="w-full rounded-xl bg-bial-teal text-white py-3.5 text-sm font-bold hover:bg-bial-teal-dark transition">Add Intern</button>
            </form>
          </div>
        </div>`; }

    function bindAdminAddIntern() { document.getElementById('addInternForm').addEventListener('submit', (e) => { e
        .preventDefault(); const fd = new FormData(e.target); const list = db.getActiveInterns();
        list.push({ id: uid(), name: fd.get('name').trim(), email: fd.get('email').trim(), department: fd.get('department'),
          college: fd.get('college').trim(), year: '', skills: (fd.get('skills') || '').split(',').map(s => s.trim())
          .filter(Boolean), projects: [], startDate: fd.get('startDate'), endDate: fd.get('endDate'), mentor: fd.get(
            'mentor').trim(), bio: '', status: 'active', createdAt: new Date().toISOString() });
        db.saveActiveInterns(list);
        showToast('Added!');
        location.hash = '#/admin/active-interns'; }); }

    // ----- Router -----
    const routes = {
      '#/login': { render: pageLogin, bind: bindLogin, public: true },
      '#/signup': { render: pageSignup, bind: bindSignup, public: true },
      '#/about': { render: pageAbout, public: true },
      '#/home': { render: pageStudentHome, role: 'student' },
      '#/positions': { render: pagePositions, bind: bindPositions, role: 'student' },
      '#/applications': { render: pageStudentApplications, role: 'student' },
      '#/interns': { render: pageInterns, bind: bindInterns, role: 'student' },
      '#/profile': { render: pageStudentProfile, role: 'student' },
      '#/admin': { render: pageAdminDashboard, role: 'admin' },
      '#/admin/settings': { render: pageAdminSettings, role: 'admin' },
      '#/admin/internships': { render: pageAdminInternships, role: 'admin' },
      '#/admin/internships/create': { render: pageAdminCreateInternship, bind: bindAdminCreateInternship, role: 'admin' },
      '#/admin/applications': { render: pageAdminApplications, bind: renderAdminApps, role: 'admin' },
      '#/admin/active-interns': { render: pageAdminActiveInterns, bind: bindAdminActiveInterns, role: 'admin' },
      '#/admin/active-interns/add': { render: pageAdminAddIntern, bind: bindAdminAddIntern, role: 'admin' }
    };

    function render() {
      let hash = location.hash || '';
      if (!hash || hash === '#/' || hash === '#/dashboard') {
        const session = db.getSession();
        if (!session) { location.hash = '#/login'; return; }
        const user = db.getUsers().find(u => u.id === session.userId);
        location.hash = user?.role === 'admin' ? '#/admin' : '#/home';
        return;
      }
      hash = hash.split('?')[0];
      const route = routes[hash];
      const app = document.getElementById('app');
      if (!route) { app.innerHTML =
          `<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950"><div class="text-center"><p class="text-slate-500 dark:text-slate-400 text-xl">Page not found</p><a href="#/login" class="mt-4 inline-block rounded-xl bg-bial-teal text-white px-6 py-3 text-sm font-bold hover:bg-bial-teal-dark transition">Go to Login</a></div></div>`;
        return; }
      if (!route.public) { const user = requireRole(route.role); if (!user) return; }
      app.innerHTML = route.render();
      if (route.bind) route.bind();
    }

    // Global functions
    window.toggleTheme = toggleTheme;
    window.render = render;
    window.logout = logout;
    window.openApplicationModal = openApplicationModal;
    window.closeApplicationModal = closeApplicationModal;
    window.filterByDepartment = filterByDepartment;
    window.debounceSearch = debounceSearch;
    window.deleteInternship = deleteInternship;
    window.editStudentProfile = editStudentProfile;
    window.updateAppStatus = updateAppStatus;
    window.renderAdminApps = renderAdminApps;
    window.renderAdminActive = renderAdminActive;
    window.toggleInternStatus = toggleInternStatus;
    window.switchInternTab = switchInternTab;
    window.filterInternsByDept = filterInternsByDept;
    window.openInternProfile = openInternProfile;
    window.closeInternProfile = closeInternProfile;
    window.saveGoogleFormUrl = saveGoogleFormUrl;
    window.openApplicantProfile = openApplicantProfile;
    window.closeApplicantProfile = closeApplicantProfile;
    window.exportSubmissionsToExcel = exportSubmissionsToExcel;

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', render);
  </script>
  <script src="renderer.js"></script>
</body>
</html>
